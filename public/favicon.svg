<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Sunset gradients -->
    <linearGradient id="sunsetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#facc15" />
      <stop offset="30%" stopColor="#f97316" />
      <stop offset="60%" stopColor="#ec4899" />
      <stop offset="85%" stopColor="#06b6d4" />
      <stop offset="100%" stopColor="#14b8a6" />
    </linearGradient>
    
    <!-- Text gradient for SH -->
    <linearGradient id="textSunset" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="#f97316" />
      <stop offset="100%" stopColor="#ec4899" />
    </linearGradient>

    <!-- Map Pin Clip Path -->
    <clipPath id="pinClip">
      <path d="M100 15 C145 15, 180 50, 180 95 C180 138, 115 180, 100 185 C85 180, 20 138, 20 95 C20 50, 55 15, 100 15 Z" />
    </clipPath>
  </defs>

  <!-- Group with Pin Clip -->
  <g clipPath="url(#pinClip)">
    <!-- Sunset Background -->
    <rect x="0" y="0" width="200" height="200" fill="url(#sunsetGrad)" />

    <!-- Mountain Hills in background -->
    <path d="M10 130 Q50 115 90 125 T190 120 L200 200 L0 200 Z" fill="#0891b2" opacity="0.6" />
    <path d="M10 145 Q60 135 110 142 T190 138 L200 200 L0 200 Z" fill="#0f766e" opacity="0.8" />

    <!-- Castle silhouette -->
    <path d="M45 140 L45 115 L50 115 L50 140 L65 140 L65 105 L71 105 L71 95 L75 95 L75 140 L90 140 L90 85 L100 85 L100 48 L103 48 L103 42 L107 42 L107 48 L110 48 L110 85 L120 85 L120 140 L135 140 L135 98 L139 98 L139 90 L143 90 L143 140 L155 140 L155 118 L160 118 L160 140 Z" fill="#1c1917" />
    
    <!-- Small glowing arched window -->
    <path d="M102 96 A2 2 0 0 1 108 96 L108 106 L102 106 Z" fill="#facc15" opacity="0.9" />
    
    <!-- Winding Path coming forward -->
    <path d="M106 130 Q85 142 110 158 T70 188 L125 188 Q138 168 112 152 T116 130 Z" fill="#1c1917" />

    <!-- 4-pointed Star -->
    <path d="M142 38 Q142 48 152 48 Q142 48 142 58 Q142 48 132 48 Q142 48 142 38 Z" fill="white" />
  </g>

  <!-- Pin Outer Border Outline -->
  <path d="M100 15 C145 15, 180 50, 180 95 C180 138, 115 180, 100 185 C85 180, 20 138, 20 95 C20 50, 55 15, 100 15 Z" stroke="#1c1917" strokeWidth="8" fill="none" strokeLinecap="round" />
</svg>